server:
  port: ${PORT:8080}

# Application properties
spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/benin_explo}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  jackson:
    serialization:
      write-dates-as-timestamps: false

  # Allow larger multipart uploads (adjust as needed)
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

jwt:
  secret: ${JWT_SECRET:YmVuaW4tZXhwbG8tZGV2LXNlY3JldC1rZXktMjAyNC1zZWN1cmUtand0}

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

image:
  storage:
    # location must be a filesystem location; use project-level `uploads/` folder
    location: ${UPLOADS_DIR:file:uploads/}

reservation:
  notifications:
    mail:
      enabled: ${RESERVATION_MAIL_ENABLED:false}
      from: ${RESERVATION_MAIL_FROM:no-reply@beninexplo.com}
    hebergement:
      mail:
        enabled: ${HEBERGEMENT_RESERVATION_MAIL_ENABLED:${RESERVATION_MAIL_ENABLED:false}}

utilisateur:
  notifications:
    mail:
      enabled: ${UTILISATEUR_MAIL_ENABLED:${RESERVATION_MAIL_ENABLED:false}}

paypal:
  enabled: ${PAYPAL_ENABLED:false}
  sandbox: ${PAYPAL_SANDBOX:true}
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  currency: ${PAYPAL_CURRENCY:EUR}
  brand-name: ${PAYPAL_BRAND_NAME:Benin Explo}
  locale: ${PAYPAL_LOCALE:fr-FR}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,https://frontend-benin-explo.netlify.app,https://*.netlify.app}
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
