server:
  port: ${PORT:8080}

# Application properties
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/benin_explo}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  jackson:
    serialization:
      write-dates-as-timestamps: false

  # Allow larger multipart uploads (adjust as needed)
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

image:
  storage:
    # location must be a filesystem location; use project-level `uploads/` folder
    location: file:uploads/

reservation:
  notifications:
    mail:
      enabled: ${RESERVATION_MAIL_ENABLED:false}
      from: ${RESERVATION_MAIL_FROM:no-reply@beninexplo.com}

app:
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
