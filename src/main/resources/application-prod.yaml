image:
  storage:
    location: ${UPLOADS_DIR}

reservation:
  notifications:
    mail:
      enabled: ${RESERVATION_MAIL_ENABLED:true}
    hebergement:
      mail:
        enabled: ${HEBERGEMENT_RESERVATION_MAIL_ENABLED:${RESERVATION_MAIL_ENABLED:true}}

utilisateur:
  notifications:
    mail:
      enabled: ${UTILISATEUR_MAIL_ENABLED:${RESERVATION_MAIL_ENABLED:true}}

paypal:
  enabled: ${PAYPAL_ENABLED:false}
  sandbox: ${PAYPAL_SANDBOX:true}
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  currency: ${PAYPAL_CURRENCY:EUR}
  brand-name: ${PAYPAL_BRAND_NAME:Benin Explo}
  locale: ${PAYPAL_LOCALE:fr-FR}

app:
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework: WARN
    org.hibernate.SQL: WARN
